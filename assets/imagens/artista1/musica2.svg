<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Album Cover Design -->
  <defs>
    <linearGradient id="grad-musica2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6f00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#grad-musica2)"/>
  
  <!-- Wave pattern -->
  <path d="M 0 200 Q 100 100 200 200 T 400 200" stroke="#fff" stroke-width="20" fill="none" opacity="0.3"/>
  <path d="M 0 240 Q 100 140 200 240 T 400 240" stroke="#fff" stroke-width="20" fill="none" opacity="0.2"/>
  <path d="M 0 160 Q 100 60 200 160 T 400 160" stroke="#fff" stroke-width="20" fill="none" opacity="0.25"/>
  
  <!-- Central play button -->
  <circle cx="200" cy="180" r="50" fill="#fff" opacity="0.2"/>
  <polygon points="175,160 175,200 220,180" fill="#fff" opacity="0.8"/>
  
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#fff">
    Música 2 - Artista 1
  </text>
  
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff" opacity="0.8">
    Álbum Especial
  </text>
</svg>