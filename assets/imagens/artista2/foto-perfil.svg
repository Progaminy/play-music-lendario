<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="#f3e5f5"/>
  
  <!-- Circle for face -->
  <circle cx="150" cy="100" r="50" fill="#e1bee7"/>
  
  <!-- Body -->
  <ellipse cx="150" cy="200" rx="70" ry="80" fill="#d8bfd8"/>
  
  <!-- Musical notes accent -->
  <g transform="translate(200, 80)">
    <circle cx="0" cy="20" r="6" fill="#8b008b"/>
    <rect x="5" y="0" width="2" height="20" fill="#8b008b"/>
    <circle cx="12" cy="10" r="5" fill="#8b008b"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#666">
    Artista 2
  </text>
</svg>