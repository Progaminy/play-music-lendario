<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Album Cover Design -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b008b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b0082;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#grad2)"/>
  
  <!-- Musical elements -->
  <circle cx="100" cy="100" r="30" fill="#fff" opacity="0.3"/>
  <circle cx="300" cy="150" r="40" fill="#fff" opacity="0.2"/>
  <circle cx="150" cy="300" r="35" fill="#fff" opacity="0.25"/>
  
  <!-- Large music note -->
  <g transform="translate(180, 150)" opacity="0.9">
    <circle cx="0" cy="80" r="20" fill="#fff"/>
    <rect x="18" y="0" width="6" height="80" fill="#fff"/>
    <circle cx="40" cy="40" r="18" fill="none" stroke="#fff" stroke-width="3"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff">
    Álbum Artista 2
  </text>
</svg>