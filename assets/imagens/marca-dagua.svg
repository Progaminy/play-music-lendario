<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" opacity="0.15">
  <!-- Music notes watermark -->
  <g transform="translate(50, 50)">
    <!-- First note -->
    <circle cx="20" cy="60" r="12" fill="currentColor"/>
    <rect x="30" y="10" width="4" height="50" fill="currentColor"/>
    
    <!-- Second note -->
    <circle cx="60" cy="70" r="12" fill="currentColor"/>
    <rect x="70" y="25" width="4" height="45" fill="currentColor"/>
    
    <!-- Connector beam -->
    <path d="M 34 10 Q 50 5 74 25" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="currentColor" opacity="0.5">
    Música Lendária
  </text>
</svg>