<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#f5f5f5"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="400" height="400" fill="url(#grid)"/>
  
  <!-- Center image icon -->
  <g transform="translate(150, 120)">
    <rect x="0" y="0" width="100" height="100" fill="#ddd" rx="5"/>
    <circle cx="30" cy="30" r="8" fill="#999"/>
    <polygon points="0,100 35,50 100,100" fill="#999"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#999">
    Imagem não disponível
  </text>
  
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#bbb">
    placeholder.jpg
  </text>
</svg>