<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Música - Musica Alendaria</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lit.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/componentes.css">
    
    <link rel="icon" href="assets/imagens/logo-lit.png" type="image/png">
    <meta name="theme-color" content="#6c3ce0">
</head>
<body class="tema-lit">

    <div class="marca-dagua">Criado por Pensador Sem Fronteira</div>

    <!-- HEADER DESKTOP -->
    <header class="header header-desktop desktop-only">
        <div class="header-logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <img src="assets/imagens/logo-lit.png" alt="Logo" style="width: 36px; height: 36px; border-radius: 8px;">
                <span style="
    font-weight: 700; 
    font-size: 1.1rem; 
    background: var(--gradiente-primario); 
    background-clip: text; 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
">Musica Alendaria</span>
            </a>
        </div>
        <nav class="nav-desktop">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="artista.html" class="nav-link">🎤 Artistas</a>
            <a href="eventos.html" class="nav-link">📅 Eventos</a>
            <a href="favoritos.html" class="nav-link">❤️ Favoritos</a>
            <a href="postar.html" class="nav-link">📤 Postar</a>
        </nav>
        <div class="header-acoes">
            <button class="btn-icone btn-alternar-tema" onclick="window.tema?.alternar()">🌓</button>
            <a href="perfil.html"><img src="assets/imagens/avatar-padrao.svg" alt="Perfil" class="avatar usuario-avatar"></a>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="pagina-musica" style="padding-bottom: calc(var(--player-altura) + 80px);">
        
        <!-- CAPA DA MÚSICA -->
        <div style="position: relative;">
            <img src="assets/imagens/placeholder.svg" alt="Capa" class="capa-musica" id="musica-capa" 
                 style="width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 0;"
                 onerror="this.style.background='var(--gradiente-dark)'">
            
            <!-- TIMER 30s SOBRE A CAPA -->
            <div id="timer-sobre-capa" style="position: absolute; top: 12px; right: 12px;">
                <span class="timer-30s">⏳ 30s</span>
            </div>
        </div>

        <!-- DETALHES DA MÚSICA -->
        <div class="detalhes-musica">
            <h1 class="titulo-musica" id="musica-titulo" style="font-size: 1.8rem;">Carregando...</h1>
            <a href="artista.html" class="artista-musica" id="musica-artista-link" style="text-decoration: none; cursor: pointer;">
                <span id="musica-artista-nome" style="font-size: 1.1rem;"></span>
            </a>
            
            <!-- META INFORMAÇÕES -->
            <div class="meta-musica">
                <span class="meta-item" id="musica-ano">📅 </span>
                <span class="meta-item" id="musica-genero">🎸 </span>
                <span class="meta-item" id="musica-lingua">🌐 </span>
                <span class="meta-item" id="musica-duracao">⏱️ </span>
                <span class="meta-item" id="musica-views">👁️ </span>
            </div>

            <!-- DESCRIÇÃO -->
            <p id="musica-descricao" style="color: var(--texto-secundario); margin-bottom: 1.5rem; line-height: 1.6;"></p>

            <!-- BOTÕES DE AÇÃO -->
            <div class="acoes-musica" style="margin-bottom: 1.5rem;">
                <button class="btn-acao primario" id="btn-ouvir" onclick="tocarMusicaPagina()">
                    ▶ Ouvir
                </button>
                <button class="btn-acao" id="btn-videoclipe" onclick="verVideoclipe()">
                    🎬 Videoclipe
                </button>
                <button class="btn-acao" id="btn-destrancar" onclick="destrancarMusicaPagina()">
                    🔓 Destrancar
                </button>
            </div>

            <!-- AÇÕES SECUNDÁRIAS -->
            <div class="acoes-musica" style="margin-bottom: 1.5rem;">
                <button class="btn-acao" id="btn-favoritar-musica" onclick="favoritarMusicaPagina()">
                    🤍 Favoritar
                </button>
                <button class="btn-acao" id="btn-baixar-audio" onclick="baixarAudio()">
                    ⬇ Baixar Áudio
                </button>
                <button class="btn-acao" id="btn-baixar-video" onclick="baixarVideo()">
                    ⬇ Baixar Vídeo
                </button>
                <button class="btn-acao" id="btn-offline" onclick="transferirOffline()">
                    📲 Offline
                </button>
                <button class="btn-acao" id="btn-compartilhar" onclick="compartilharMusica()">
                    📤 Partilhar
                </button>
            </div>

            <!-- BARRA DE PROGRESSO 30s -->
            <div style="margin-bottom: 1.5rem;">
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--texto-terciario); margin-bottom: 0.25rem;">
                    <span class="tempo-atual">0:00</span>
                    <span class="tempo-duracao">0:00</span>
                </div>
                <div class="barra-30s">
                    <div class="barra-30s-preenchida" style="width: 0%;"></div>
                </div>
            </div>

            <!-- LETRA DA MÚSICA -->
            <div style="margin-top: 2rem;">
                <h3 style="margin-bottom: 0.75rem;">📝 Letra</h3>
                <div class="letra-musica bloqueada" id="letra-musica-container">
                    <pre id="letra-musica-texto" style="font-family: var(--fonte-principal); white-space: pre-line; margin: 0;">Carregando letra...</pre>
                </div>
                <button id="btn-ver-letra-completa" class="btn-pequeno btn-secundario" style="margin-top: 0.5rem;" onclick="mostrarLetraCompleta()">
                    🔓 Destrancar para ver letra completa
                </button>
            </div>
        </div>

    </main>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="nav-mobile mobile-only">
        <button class="nav-item" data-nav="index"><span class="icon-nav">🏠</span><span>Home</span></button>
        <button class="nav-item" data-nav="favoritos"><span class="icon-nav">❤️</span><span>Favoritos</span></button>
        <button class="nav-item" data-nav="postar"><span class="icon-nav">➕</span><span>Postar</span></button>
        <button class="nav-item" data-nav="eventos"><span class="icon-nav">📅</span><span>Eventos</span></button>
        <button class="nav-item" data-nav="perfil"><span class="icon-nav">👤</span><span>Perfil</span></button>
    </nav>

    <!-- PLAYER FIXO -->
    <div class="player-fixo">
        <div class="player-progresso-container">
            <div class="player-progresso-preenchido" style="width: 0%;"></div>
        </div>
        <img src="assets/imagens/placeholder.svg" alt="Capa" class="player-capa">
        <div class="player-info">
            <div class="player-titulo">Nenhuma música</div>
            <div class="player-artista">Selecione uma música</div>
        </div>
        <div class="player-controles">
            <button class="btn-player btn-favorito">🤍</button>
        </div>
        <button class="btn-player btn-play">▶</button>
    </div>

    <div class="toast-container"></div>

    <!-- SCRIPTS -->
    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/postagem.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/suporte.js"></script>
    <script src="js/app.js"></script>

    <script>
        let musicaAtual = null;
        let artistaAtual = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth?.isAutenticado()) {
                window.location.href = 'login.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const musicaId = params.get('id') || DB.musicas[0]?.id;

            if (musicaId) {
                carregarMusica(musicaId);
            }
        });

        function carregarMusica(musicaId) {
            musicaAtual = buscarMusica(musicaId);
            if (!musicaAtual) {
                window.location.href = 'index.html';
                return;
            }

            artistaAtual = buscarArtista(musicaAtual.artistaId);

            document.title = `${musicaAtual.titulo} - ${artistaAtual?.nome || ''} | Musica Alendaria`;

            // Capa
            document.getElementById('musica-capa').src = musicaAtual.capa;
            document.getElementById('musica-capa').alt = musicaAtual.titulo;

            // Título e artista
            document.getElementById('musica-titulo').textContent = musicaAtual.titulo;
            document.getElementById('musica-artista-nome').textContent = artistaAtual?.nome || 'Artista';
            document.getElementById('musica-artista-link').href = `artista.html?id=${musicaAtual.artistaId}`;

            // Meta
            document.getElementById('musica-ano').textContent = `📅 ${musicaAtual.ano}`;
            document.getElementById('musica-genero').textContent = `🎸 ${musicaAtual.genero}`;
            document.getElementById('musica-lingua').textContent = `🌐 ${musicaAtual.lingua}`;
            document.getElementById('musica-duracao').textContent = `⏱️ ${musicaAtual.duracao}`;
            document.getElementById('musica-views').textContent = `👁️ ${formatarNumero(musicaAtual.visualizacoes || 0)} views`;

            // Descrição
            document.getElementById('musica-descricao').textContent = musicaAtual.descricao || 
                `Música do álbum de ${artistaAtual?.nome || 'artista'}, lançada em ${musicaAtual.ano}.`;

            // Letra
            document.getElementById('letra-musica-texto').textContent = musicaAtual.letra || 'Letra não disponível.';

            // Atualizar botão de favorito
            atualizarBotaoFavorito();

            // Verificar se está destrancado
            atualizarEstadoDestrancado();
        }

        function tocarMusicaPagina() {
            if (musicaAtual) {
                window.player?.tocar(musicaAtual, false);
                mostrarToast('▶ A tocar: ' + musicaAtual.titulo, 'info');
            }
        }

        function verVideoclipe() {
            if (musicaAtual) {
                window.modal?.video(musicaAtual);
            }
        }

        function destrancarMusicaPagina() {
            if (musicaAtual) {
                window.player?.carregar(musicaAtual, false);
                window.player?.destrancar(musicaAtual.id);
                atualizarEstadoDestrancado();
                mostrarLetraCompleta();
            }
        }

        function favoritarMusicaPagina() {
            if (musicaAtual) {
                window.favoritos?.alternar(musicaAtual.id);
                atualizarBotaoFavorito();
            }
        }

        function baixarAudio() {
            if (!musicaAtual) return;
            const estado = window.player?.getEstado();
            if (!estado?.estaDestrancado) {
                mostrarToast('Destranque a música primeiro para baixar', 'aviso');
                return;
            }
            window.offline?.baixar(musicaAtual.id, 'audio');
        }

        function baixarVideo() {
            if (!musicaAtual) return;
            const estado = window.player?.getEstado();
            if (!estado?.estaDestrancado) {
                mostrarToast('Destranque a música primeiro para baixar', 'aviso');
                return;
            }
            window.offline?.baixar(musicaAtual.id, 'video');
        }

        function transferirOffline() {
            if (!musicaAtual) return;
            const estado = window.player?.getEstado();
            if (!estado?.estaDestrancado) {
                mostrarToast('Destranque a música primeiro para transferir', 'aviso');
                return;
            }
            window.player?.transferirOffline(musicaAtual.id);
        }

        function compartilharMusica() {
            if (!musicaAtual) return;
            const texto = `🎵 ${musicaAtual.titulo} - ${artistaAtual?.nome || ''}\n${musicaAtual.genero} • ${musicaAtual.ano}\n\nOuça na Musica Alendaria! 🚀`;
            
            if (navigator.share) {
                navigator.share({ title: musicaAtual.titulo, text: texto }).catch(() => {});
            } else {
                navigator.clipboard.writeText(texto).then(() => {
                    mostrarToast('📋 Link copiado!', 'sucesso');
                });
            }
        }

        function mostrarLetraCompleta() {
            const estado = window.player?.getEstado();
            if (!estado?.estaDestrancado && musicaAtual) {
                window.player?.destrancar(musicaAtual.id);
            }
            
            const letraContainer = document.getElementById('letra-musica-container');
            const btnLetra = document.getElementById('btn-ver-letra-completa');
            
            letraContainer.classList.remove('bloqueada');
            letraContainer.style.maxHeight = 'none';
            letraContainer.style.overflow = 'visible';
            btnLetra.classList.add('hidden');
        }

        function atualizarBotaoFavorito() {
            const btn = document.getElementById('btn-favoritar-musica');
            if (!btn || !musicaAtual) return;
            
            const isFav = window.favoritos?.isFavorito(musicaAtual.id);
            btn.innerHTML = isFav ? '❤️ Favoritado' : '🤍 Favoritar';
            btn.classList.toggle('favoritado', isFav);
        }

        function atualizarEstadoDestrancado() {
            const estado = window.player?.getEstado();
            const destrancado = estado?.estaDestrancado || false;

            // Botão destrancar
            const btnDestrancar = document.getElementById('btn-destrancar');
            if (btnDestrancar) {
                btnDestrancar.innerHTML = destrancado ? '🔓 Destrancado' : '🔓 Destrancar';
                btnDestrancar.classList.toggle('destrancado', destrancado);
            }

            // Botões de download/offline
            ['btn-baixar-audio', 'btn-baixar-video', 'btn-offline'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.style.opacity = destrancado ? '1' : '0.5';
                    btn.style.pointerEvents = destrancado ? 'auto' : 'none';
                }
            });

            // Letra
            if (destrancado) {
                document.getElementById('btn-ver-letra-completa')?.classList.add('hidden');
                const letraContainer = document.getElementById('letra-musica-container');
                if (letraContainer) {
                    letraContainer.classList.remove('bloqueada');
                    letraContainer.style.maxHeight = 'none';
                }
            }
        }

        function formatarNumero(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
            return num?.toString() || '0';
        }

        function mostrarToast(mensagem, tipo = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.innerHTML = `<span class="toast-mensagem">${mensagem}</span>`;
            
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('saindo');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>

</body>
</html>
