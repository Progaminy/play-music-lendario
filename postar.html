<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Musica Alendaria</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lit.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/componentes.css">
    
    <link rel="icon" href="" type="image/png">
    <meta name="theme-color" content="#6c3ce0">
</head>
<body class="tema-lit">

    <div class="marca-dagua">Criado por Pensador Sem Fronteira</div>

    <!-- HEADER DESKTOP -->
    <header class="header header-desktop desktop-only">
        <div class="header-logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <img src="" alt="Logo" style="width: 36px; height: 36px; border-radius: 8px;">
                <span style="
    font-weight: 700; 
    font-size: 1.1rem; 
    background: var(--gradiente-primario); 
    background-clip: text; 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
">Musica Alendaria</span>
            </a>
        </div>
        <nav class="nav-desktop">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="artista.html" class="nav-link">🎤 Artistas</a>
            <a href="eventos.html" class="nav-link ativo">📅 Eventos</a>
            <a href="favoritos.html" class="nav-link">❤️ Favoritos</a>
            <a href="postar.html" class="nav-link">📤 Postar</a>
        </nav>
        <div class="header-acoes">
            <button class="btn-icone btn-alternar-tema" onclick="window.tema?.alternar()">🌓</button>
            <a href="perfil.html"><img src="assets/imagens/avatar-padrao.svg" alt="Perfil" class="avatar usuario-avatar"></a>
        </div>
    </header>

    <main class="container" style="padding-bottom: calc(var(--player-altura) + 80px);">
        
        <!-- TÍTULO -->
        <div class="animar-entrada-cima" style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
            <h1 style="font-size: 1.5rem;">📅 Eventos</h1>
            <button class="btn btn-primario" onclick="mostrarFormEvento()">
                + Criar Evento
            </button>
        </div>

        <!-- FILTROS DE EVENTOS -->
        <div style="padding: 0 1rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
            <!-- Filtro por tipo -->
            <select id="filtro-evento-tipo" style="width: auto; padding: 8px 12px; font-size: 0.85rem;">
                <option value="">Todos os tipos</option>
            </select>

            <!-- Filtro por data -->
            <div style="display: flex; gap: 0.25rem;">
                <button class="filtro-evento-data btn-pequeno ativo" data-data-filtro="todos" style="background: var(--cor-primaria); color: white; border-radius: 20px;">Todos</button>
                <button class="filtro-evento-data btn-pequeno btn-secundario" data-data-filtro="hoje">Hoje</button>
                <button class="filtro-evento-data btn-pequeno btn-secundario" data-data-filtro="futuros">Futuros</button>
                <button class="filtro-evento-data btn-pequeno btn-secundario" data-data-filtro="passados">Passados</button>
            </div>
        </div>

        <!-- FORMULÁRIO DE CRIAÇÃO (INICIALMENTE ESCONDIDO) -->
        <div id="form-evento-container" class="hidden" style="padding: 0 1rem; margin-bottom: 1.5rem;">
            <form id="form-evento" class="form-auth" style="padding: 1.5rem;">
                <h3 style="margin-bottom: 1rem;">📝 Criar Novo Evento</h3>
                
                <div class="campo">
                    <label for="evento-tipo">Tipo de Evento *</label>
                    <select id="evento-tipo" required>
                        <option value="">Selecionar tipo...</option>
                    </select>
                </div>

                <div class="campo">
                    <label for="evento-titulo">Título</label>
                    <input type="text" id="evento-titulo" placeholder="Nome do evento">
                </div>

                <div class="campo">
                    <label for="evento-descricao">Descrição</label>
                    <textarea id="evento-descricao" rows="3" placeholder="Descreva o evento..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="campo">
                        <label for="evento-data">Data</label>
                        <input type="date" id="evento-data">
                    </div>
                    <div class="campo">
                        <label for="evento-hora">Hora</label>
                        <input type="time" id="evento-hora">
                    </div>
                </div>

                <div class="campo">
                    <label for="evento-local">Local</label>
                    <input type="text" id="evento-local" placeholder="Local do evento">
                </div>

                <div class="campo">
                    <label for="evento-foto">Foto (Link)</label>
                    <input type="url" id="evento-foto" placeholder="https://...">
                </div>

                <div class="campo">
                    <label for="evento-video">Vídeo (Link)</label>
                    <input type="url" id="evento-video" placeholder="https://...">
                </div>

                <div class="campo">
                    <label for="evento-audio">Áudio (Link)</label>
                    <input type="url" id="evento-audio" placeholder="https://...">
                </div>

                <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primario" style="flex: 1;">📅 Criar Evento</button>
                    <button type="button" class="btn btn-secundario" onclick="esconderFormEvento()">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- LISTA DE EVENTOS -->
        <div class="grid-eventos" style="padding: 0 1rem;">
            <!-- Preenchido pelo JS -->
            <div class="loading-container" style="grid-column: 1 / -1;">
                <div class="spinner"></div>
            </div>
        </div>

    </main>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="nav-mobile mobile-only">
        <button class="nav-item" data-nav="index"><span class="icon-nav">🏠</span><span>Home</span></button>
        <button class="nav-item" data-nav="favoritos"><span class="icon-nav">❤️</span><span>Favoritos</span></button>
        <button class="nav-item" data-nav="postar"><span class="icon-nav">➕</span><span>Postar</span></button>
        <button class="nav-item ativo" data-nav="eventos"><span class="icon-nav">📅</span><span>Eventos</span></button>
        <button class="nav-item" data-nav="perfil"><span class="icon-nav">👤</span><span>Perfil</span></button>
    </nav>

    <!-- PLAYER FIXO -->
    <div class="player-fixo">
        <div class="player-progresso-container">
            <div class="player-progresso-preenchido" style="width: 0%;"></div>
        </div>
        <img src="assets/imagens/placeholder.svg" alt="Capa" class="player-capa">
        <div class="player-info">
            <div class="player-titulo">Nenhuma música</div>
            <div class="player-artista">Selecione uma música</div>
        </div>
        <div class="player-controles">
            <button class="btn-player btn-favorito">🤍</button>
        </div>
        <button class="btn-player btn-play">▶</button>
    </div>

    <div class="toast-container"></div>

    <!-- SCRIPTS -->
    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/postagem.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/suporte.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth?.isAutenticado()) {
                window.location.href = 'login.html';
                return;
            }

            // Popular select de tipos
            const selectTipo = document.getElementById('filtro-evento-tipo');
            if (selectTipo) {
                const tipos = DB.filtros?.tiposEvento || [];
                tipos.forEach(t => {
                    const option = document.createElement('option');
                    option.value = t;
                    option.textContent = t;
                    selectTipo.appendChild(option);
                });
            }

            // Popular select do formulário
            const selectFormTipo = document.getElementById('evento-tipo');
            if (selectFormTipo) {
                const tipos = DB.filtros?.tiposEvento || [];
                tipos.forEach(t => {
                    const option = document.createElement('option');
                    option.value = t;
                    option.textContent = t;
                    selectFormTipo.appendChild(option);
                });
            }

            // Configurar filtros de data
            document.querySelectorAll('.filtro-evento-data').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filtro-evento-data').forEach(b => {
                        b.classList.remove('ativo');
                        b.style.background = '';
                        b.style.color = '';
                    });
                    this.classList.add('ativo');
                    this.style.background = 'var(--cor-primaria)';
                    this.style.color = 'white';
                });
            });
        });

        function mostrarFormEvento() {
            document.getElementById('form-evento-container').classList.remove('hidden');
            document.getElementById('form-evento-container').scrollIntoView({ behavior: 'smooth' });
        }

        function esconderFormEvento() {
            document.getElementById('form-evento-container').classList.add('hidden');
            document.getElementById('form-evento').reset();
        }
    </script>

</body>
</html>
