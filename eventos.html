<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musica Alendaria - Eventos</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lit.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/componentes.css">
    
    <meta name="theme-color" content="#6c3ce0">
</head>
<body class="tema-lit">

    <div class="marca-dagua">Criado por Pensador Sem Fronteira</div>

    <header class="header header-desktop desktop-only">
        <div class="header-logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <span style="font-size: 2rem;">🎵</span>
                <span style="font-weight: 700; font-size: 1.1rem; background: var(--gradiente-primario); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Musica Alendaria</span>
            </a>
        </div>
        <nav class="nav-desktop">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="artista.html" class="nav-link">🎤 Artistas</a>
            <a href="eventos.html" class="nav-link ativo">📅 Eventos</a>
            <a href="favoritos.html" class="nav-link">❤️ Favoritos</a>
            <a href="postar.html" class="nav-link">📤 Postar</a>
        </nav>
        <div class="header-acoes">
            <button class="btn-icone btn-alternar-tema" onclick="window.tema?.alternar()">🌓</button>
            <a href="perfil.html"><span style="width: 36px; height: 36px; border-radius: 50%; background: var(--gradiente-primario); display: flex; align-items: center; justify-content: center; font-size: 18px;">👤</span></a>
        </div>
    </header>

    <main class="container" style="padding-bottom: calc(var(--player-altura) + 100px);">
        
        <!-- TÍTULO -->
        <div class="animar-entrada-cima" style="padding: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
            <div>
                <h1 style="font-size: 1.5rem;">📅 Eventos</h1>
                <p style="color: var(--texto-terciario); font-size: 0.85rem;">Shows, lançamentos e encontros musicais</p>
            </div>
            <button class="btn btn-primario" onclick="mostrarFormEvento()">+ Criar Evento</button>
        </div>

        <!-- FORMULÁRIO DE EVENTO -->
        <div id="form-evento-container" class="hidden" style="padding: 0 1rem; margin-bottom: 1.5rem;">
            <form id="form-evento" class="form-auth" style="padding: 1.5rem;">
                <h3 style="margin-bottom: 1rem;">📝 Criar Novo Evento</h3>
                
                <div class="campo">
                    <label for="evento-artista">Nome do Artista *</label>
                    <input type="text" id="evento-artista" placeholder="Nome do cantor ou banda" required>
                </div>

                <div class="campo">
                    <label for="evento-link">Link do Vídeo (YouTube) *</label>
                    <input type="url" id="evento-link" placeholder="https://youtube.com/watch?v=..." required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="campo">
                        <label for="evento-data-inicio">Data de Início *</label>
                        <input type="date" id="evento-data-inicio" required>
                    </div>
                    <div class="campo">
                        <label for="evento-data-fim">Data de Fim *</label>
                        <input type="date" id="evento-data-fim" required>
                    </div>
                </div>

                <div class="campo">
                    <label>Visibilidade *</label>
                    <div class="radio-group">
                        <label class="radio-opcao">
                            <input type="radio" name="evento-visibilidade" value="publico" checked> 🌍 Público
                        </label>
                        <label class="radio-opcao">
                            <input type="radio" name="evento-visibilidade" value="privado"> 🔒 Privado
                        </label>
                    </div>
                </div>

                <button type="button" class="btn btn-secundario btn-pequeno" id="btn-opcionais-evento" style="margin-bottom: 1rem; width: 100%;">
                    + Adicionar mais informações (opcional)
                </button>

                <div id="campos-opcionais-evento" class="hidden">
                    <div class="campo">
                        <label for="evento-local">Local</label>
                        <input type="text" id="evento-local" placeholder="Local do evento">
                    </div>
                    <div class="campo">
                        <label for="evento-hora">Hora</label>
                        <input type="time" id="evento-hora">
                    </div>
                    <div class="campo">
                        <label for="evento-descricao">Descrição</label>
                        <textarea id="evento-descricao" rows="2" placeholder="Descreva o evento..."></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 0.5rem;">
                    <button type="submit" class="btn btn-primario" style="flex: 1;">📅 Criar Evento</button>
                    <button type="button" class="btn btn-secundario" onclick="esconderFormEvento()">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- LISTA DE EVENTOS -->
        <div class="grid-eventos" id="lista-eventos" style="padding: 0 1rem;">
            <div class="estado-vazio" style="grid-column: 1 / -1;">
                <div class="vazio-icone">📅</div>
                <h4 class="vazio-titulo">Nenhum evento ainda</h4>
                <p class="vazio-descricao">Crie o primeiro evento clicando no botão acima!</p>
            </div>
        </div>

    </main>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="nav-mobile mobile-only">
        <button class="nav-item" data-nav="index"><span class="icon-nav">🏠</span><span>Home</span></button>
        <button class="nav-item" data-nav="favoritos"><span class="icon-nav">❤️</span><span>Favoritos</span></button>
        <button class="nav-item" data-nav="postar"><span class="icon-nav">➕</span><span>Postar</span></button>
        <button class="nav-item ativo" data-nav="eventos"><span class="icon-nav">📅</span><span>Eventos</span></button>
        <button class="nav-item" data-nav="perfil"><span class="icon-nav">👤</span><span>Perfil</span></button>
    </nav>

    <!-- PLAYER FIXO -->
    <div class="player-fixo" style="min-height: 72px;">
        <div class="player-progresso-container">
            <div class="player-progresso-preenchido" style="width: 0%;"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; width: 100%;">
            <span style="font-size: 2rem;">🎵</span>
            <div class="player-info" style="flex: 1; min-width: 0;">
                <div class="player-titulo" style="font-size: 0.9rem; font-weight: 600;">Nenhuma música</div>
                <div class="player-artista" style="font-size: 0.75rem; color: var(--texto-terciario);">Selecione uma música</div>
                <div class="timer-30s hidden" style="font-size: 0.7rem;">⏳ 30s</div>
            </div>
            <button class="btn-player btn-favorito" title="Like" style="font-size: 1.2rem;">🤍</button>
            <button class="btn-player btn-play" title="Play/Pause" style="background: var(--gradiente-primario); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1rem;">▶</button>
        </div>
        <div id="player-iframe-container" style="display: none;"></div>
    </div>

    <div class="toast-container"></div>

    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/postagem.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/suporte.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth?.isAutenticado()) {
                window.location.href = 'login.html';
                return;
            }
            carregarEventos();
        });

        function mostrarFormEvento() {
            document.getElementById('form-evento-container').classList.remove('hidden');
            document.getElementById('form-evento-container').scrollIntoView({ behavior: 'smooth' });
        }

        function esconderFormEvento() {
            document.getElementById('form-evento-container').classList.add('hidden');
            document.getElementById('form-evento').reset();
        }

        // Campos opcionais
        document.getElementById('btn-opcionais-evento').addEventListener('click', function(e) {
            e.preventDefault();
            const campos = document.getElementById('campos-opcionais-evento');
            const isHidden = campos.classList.contains('hidden');
            campos.classList.toggle('hidden');
            this.textContent = isHidden ? '- Ocultar informações opcionais' : '+ Adicionar mais informações (opcional)';
        });

        // Submeter evento
        document.getElementById('form-evento').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const evento = {
                id: 'evt-' + Date.now(),
                artista: document.getElementById('evento-artista').value.trim(),
                link: document.getElementById('evento-link').value.trim(),
                dataInicio: document.getElementById('evento-data-inicio').value,
                dataFim: document.getElementById('evento-data-fim').value,
                visibilidade: document.querySelector('input[name="evento-visibilidade"]:checked')?.value || 'publico',
                local: document.getElementById('evento-local').value.trim(),
                hora: document.getElementById('evento-hora').value,
                descricao: document.getElementById('evento-descricao').value.trim(),
                dataCriacao: new Date().toISOString(),
                usuarioId: window.auth?.getUsuarioAtual()?.id,
                usuarioNome: window.auth?.getUsuarioAtual()?.nome
            };

            if (!evento.artista || !evento.link || !evento.dataInicio || !evento.dataFim) {
                mostrarToast('Preencha todos os campos obrigatórios (*)', 'erro');
                return;
            }

            // Guardar no localStorage com a chave 'eventos'
            const eventos = JSON.parse(localStorage.getItem('eventos') || '[]');
            eventos.unshift(evento);
            localStorage.setItem('eventos', JSON.stringify(eventos));

            esconderFormEvento();
            carregarEventos();
            mostrarToast('✅ Evento criado com sucesso!', 'sucesso');
        });

        function carregarEventos() {
            const container = document.getElementById('lista-eventos');
            const usuario = window.auth?.getUsuarioAtual();
            const todosEventos = JSON.parse(localStorage.getItem('eventos') || '[]');
            
            // Filtrar: públicos + privados do usuário
            let eventos = todosEventos.filter(evt => 
                evt.visibilidade === 'publico' || evt.usuarioId === usuario?.id
            );

            // Ordenar por data de criação (mais recente primeiro)
            eventos.sort((a, b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));

            if (eventos.length === 0) {
                container.innerHTML = `
                    <div class="estado-vazio" style="grid-column: 1 / -1;">
                        <div class="vazio-icone">📅</div>
                        <h4 class="vazio-titulo">Nenhum evento encontrado</h4>
                        <p class="vazio-descricao">Crie o primeiro evento!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = eventos.map(evt => {
                const videoId = extrairYoutubeId(evt.link);
                const dataInicio = evt.dataInicio ? new Date(evt.dataInicio + 'T' + (evt.hora || '00:00')) : null;
                const dia = dataInicio ? dataInicio.getDate().toString().padStart(2, '0') : '??';
                const mes = dataInicio ? dataInicio.toLocaleString('pt', { month: 'short' }).toUpperCase().substring(0, 3) : '???';
                const isDono = evt.usuarioId === usuario?.id;

                return `
                    <div class="card-evento" style="overflow: hidden;">
                        ${videoId ? `
                            <div style="position: relative; padding-bottom: 56.25%; height: 0; margin: -1rem -1rem 1rem -1rem; background: #000;">
                                <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; cursor: pointer;" 
                                     onclick="abrirVideoEvento('${evt.id}')" title="Clique para assistir"></div>
                                <iframe src="https://www.youtube.com/embed/${videoId}?controls=0&modestbranding=1&rel=0" 
                                    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
                                    allow="autoplay; encrypted-media">
                                </iframe>
                            </div>
                        ` : ''}
                        <div class="data-evento">
                            <span class="dia-evento">${dia}</span>
                            <span class="mes-evento">${mes}</span>
                        </div>
                        <div class="info-evento">
                            <div style="display: flex; gap: 0.25rem; flex-wrap: wrap; margin-bottom: 0.25rem;">
                                <span class="tipo-evento">${evt.visibilidade === 'publico' ? '🌍 Público' : '🔒 Privado'}</span>
                                ${isDono ? '<span class="badge badge-aviso" style="font-size: 0.7rem;">👤 Seu evento</span>' : ''}
                            </div>
                            <h4 class="nome-evento">${evt.artista}</h4>
                            ${evt.descricao ? `<p style="font-size: 0.8rem; color: var(--texto-secundario); margin: 0.25rem 0;">${evt.descricao}</p>` : ''}
                            <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem; font-size: 0.75rem; color: var(--texto-terciario); flex-wrap: wrap;">
                                ${evt.hora ? `<span>🕐 ${evt.hora}</span>` : ''}
                                ${evt.local ? `<span>📍 ${evt.local}</span>` : ''}
                            </div>
                            <div style="font-size: 0.72rem; color: var(--texto-terciario); margin-top: 0.25rem;">
                                📆 ${formatarData(evt.dataInicio)} → ${formatarData(evt.dataFim)}
                            </div>
                            <div style="font-size: 0.65rem; color: var(--texto-terciario); margin-top: 0.25rem;">
                                Por ${evt.usuarioNome || 'Usuário'} • ${new Date(evt.dataCriacao).toLocaleDateString('pt')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function abrirVideoEvento(eventoId) {
            const eventos = JSON.parse(localStorage.getItem('eventos') || '[]');
            const evento = eventos.find(e => e.id === eventoId);
            if (!evento) return;

            const videoId = extrairYoutubeId(evento.link);
            if (!videoId) return;

            // Abrir no modal da home (simples)
            const modal = document.createElement('div');
            modal.style.cssText = 'position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: flex; align-items: center; justify-content: center;';
            modal.innerHTML = `
                <div style="width: 90vw; max-width: 800px; position: relative;">
                    <button onclick="this.parentElement.parentElement.remove()" style="position: absolute; top: -40px; right: 0; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
                    <div style="position: relative; padding-bottom: 56.25%; height: 0;">
                        <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                    </div>
                    <p style="color: white; text-align: center; margin-top: 0.5rem;">${evento.artista}</p>
                </div>
            `;
            modal.addEventListener('click', function(e) { if (e.target === this) this.remove(); });
            document.body.appendChild(modal);
        }

        function extrairYoutubeId(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function formatarData(data) {
            if (!data) return '?';
            const d = new Date(data + 'T00:00:00');
            return d.toLocaleDateString('pt');
        }

        function mostrarToast(msg, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.innerHTML = `<span class="toast-mensagem">${msg}</span>`;
            document.querySelector('.toast-container')?.appendChild(toast);
            setTimeout(() => { toast.classList.add('saindo'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
