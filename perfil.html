<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musica Alendaria - Meu Perfil</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lit.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/componentes.css">
    
    <meta name="theme-color" content="#6c3ce0">
</head>
<body class="tema-lit">

    <div class="marca-dagua">Pensador Sem Fronteira</div>

    <header class="header header-desktop desktop-only">
        <div class="header-logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <span style="font-size: 2rem;">🎵</span>
                <span style="font-weight: 700; font-size: 1.1rem; background: var(--gradiente-primario); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Musica Alendaria</span>
            </a>
        </div>
        <nav class="nav-desktop">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="artista.html" class="nav-link">🎤 Artistas</a>
            <a href="eventos.html" class="nav-link">📅 Eventos</a>
            <a href="favoritos.html" class="nav-link">❤️ Favoritos</a>
            <a href="postar.html" class="nav-link">📤 Postar</a>
        </nav>
        <div class="header-acoes">
            <button class="btn-icone btn-alternar-tema" onclick="window.tema?.alternar()">🌓</button>
            <a href="definicoes.html" style="font-size: 1.2rem; text-decoration: none;">⚙️</a>
        </div>
    </header>

    <main class="container" style="padding-bottom: calc(var(--player-altura) + 100px);">
        
        <!-- CABEÇALHO DO PERFIL -->
        <div class="perfil-header animar-entrada-cima" style="padding: 1.5rem 1rem; text-align: center;">
            <div style="position: relative; display: inline-block; cursor: pointer;" onclick="document.getElementById('input-foto-perfil').click()">
                <span id="foto-perfil-display" style="width: 100px; height: 100px; border-radius: 50%; background: var(--gradiente-primario); display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto;">👤</span>
                <span style="position: absolute; bottom: 0; right: 0; background: var(--cor-acento); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">📷</span>
                <input type="file" id="input-foto-perfil" accept="image/*" style="display: none;" onchange="atualizarFotoPerfil(event)">
            </div>
            <h1 class="nome-usuario" id="perfil-nome" style="margin-top: 0.75rem;">Visitante Musical</h1>
            <p class="localizacao" id="perfil-localizacao">📍 Angola, Luanda</p>
            <p class="localizacao" id="perfil-lingua">🌐 Português</p>
            
            <div id="perfil-redes" style="margin-top: 0.5rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;"></div>
            <div id="perfil-contacto" style="margin-top: 0.25rem; font-size: 0.85rem; color: var(--texto-secundario);"></div>
            
            <div style="margin-top: 0.75rem; display: flex; gap: 1.5rem; justify-content: center; font-size: 0.85rem; color: var(--texto-secundario);">
                <span>❤️ <strong id="contador-favoritos">0</strong></span>
                <span>📤 <strong id="contador-postes">0</strong></span>
                <span>📅 <strong id="contador-eventos">0</strong></span>
            </div>
        </div>

        <!-- BOTÕES -->
        <div style="display: flex; gap: 0.5rem; padding: 0 1rem; margin-bottom: 1.5rem; justify-content: center; flex-wrap: wrap;">
            <a href="definicoes.html" class="btn btn-secundario btn-pequeno">⚙️ Definições</a>
            <button class="btn btn-secundario btn-pequeno" onclick="window.auth?.logout()">🚪 Sair</button>
        </div>

        <!-- TABS -->
        <div class="tabs" style="padding: 0 1rem; margin-bottom: 1rem; overflow-x: auto;">
            <button class="tab ativo" data-tab="postes" onclick="alternarTab('postes')">📤 Meus Postes</button>
            <button class="tab" data-tab="eventos" onclick="alternarTab('eventos')">📅 Meus Eventos</button>
            <button class="tab" data-tab="favoritos" onclick="alternarTab('favoritos')">❤️ Favoritos</button>
        </div>

        <!-- CONTEÚDO DAS TABS -->
        <div style="padding: 0 1rem;">
            
            <!-- TAB POSTES -->
            <div id="tab-postes" class="tab-conteudo">
                <div id="lista-postes-perfil" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div class="estado-vazio"><p class="vazio-descricao">Carregando...</p></div>
                </div>
            </div>

            <!-- TAB EVENTOS -->
            <div id="tab-eventos" class="tab-conteudo hidden">
                <div id="lista-eventos-perfil" class="grid-eventos" style="padding: 0;">
                    <div class="estado-vazio" style="grid-column: 1 / -1;"><p class="vazio-descricao">Carregando...</p></div>
                </div>
            </div>

            <!-- TAB FAVORITOS -->
            <div id="tab-favoritos" class="tab-conteudo hidden">
                <div id="lista-favoritos-perfil" class="lista-musicas" style="padding: 0;">
                    <div class="estado-vazio"><p class="vazio-descricao">Nenhuma música favorita ainda</p></div>
                </div>
            </div>

        </div>

    </main>

    <!-- MODAL DE EDIÇÃO DE POSTE -->
    <div id="modal-editar-poste" class="modal-overlay hidden" style="z-index: 3000;">
        <div class="modal-conteudo" style="max-width: 500px; padding: 1.5rem;">
            <h3 style="margin-bottom: 1rem;">✏️ Editar Poste</h3>
            <input type="hidden" id="editar-poste-id">
            <div class="campo">
                <label for="editar-poste-artista">Nome do Artista</label>
                <input type="text" id="editar-poste-artista">
            </div>
            <div class="campo">
                <label for="editar-poste-descricao">Descrição</label>
                <textarea id="editar-poste-descricao" rows="2"></textarea>
            </div>
            <div class="campo">
                <label for="editar-poste-estilo">Estilo Musical</label>
                <input type="text" id="editar-poste-estilo" placeholder="Ex: Kizomba, Semba...">
            </div>
            <div class="campo">
                <label for="editar-poste-lingua">Língua da Música</label>
                <input type="text" id="editar-poste-lingua" placeholder="Ex: Português, Kimbundu...">
            </div>
            <div class="campo">
                <label for="editar-poste-ano">Ano de Lançamento</label>
                <input type="number" id="editar-poste-ano" placeholder="Ex: 2025">
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button class="btn btn-primario" onclick="salvarEdicaoPoste()" style="flex: 1;">💾 Salvar</button>
                <button class="btn btn-secundario" onclick="fecharModalEdicao()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="nav-mobile mobile-only">
        <button class="nav-item" data-nav="index"><span class="icon-nav">🏠</span><span>Home</span></button>
        <button class="nav-item" data-nav="favoritos"><span class="icon-nav">❤️</span><span>Favoritos</span></button>
        <button class="nav-item" data-nav="postar"><span class="icon-nav">➕</span><span>Postar</span></button>
        <button class="nav-item" data-nav="eventos"><span class="icon-nav">📅</span><span>Eventos</span></button>
        <button class="nav-item ativo" data-nav="perfil"><span class="icon-nav">👤</span><span>Perfil</span></button>
    </nav>

    <!-- PLAYER FIXO -->
    <div class="player-fixo" style="min-height: 72px;">
        <div class="player-progresso-container">
            <div class="player-progresso-preenchido" style="width: 0%;"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; width: 100%;">
            <span style="font-size: 2rem;">🎵</span>
            <div class="player-info" style="flex: 1; min-width: 0;">
                <div class="player-titulo" style="font-size: 0.9rem; font-weight: 600;">Nenhuma música</div>
                <div class="player-artista" style="font-size: 0.75rem; color: var(--texto-terciario);">Selecione uma música</div>
                <div class="timer-30s hidden" style="font-size: 0.7rem;">⏳ 30s</div>
            </div>
            <button class="btn-player btn-favorito" title="Like" style="font-size: 1.2rem;">🤍</button>
            <button class="btn-player btn-play" title="Play/Pause" style="background: var(--gradiente-primario); color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1rem;">▶</button>
            <button class="btn-destrancar-player btn-pequeno" title="Destrancar" style="font-size: 0.75rem; white-space: nowrap;" onclick="window.player?.destrancar()">🔓 Destrancar</button>
        </div>
        <div id="player-iframe-container" style="display: none;"></div>
    </div>

    <div class="toast-container"></div>

    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/postagem.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/suporte.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth?.isAutenticado()) {
                window.location.href = 'login.html';
                return;
            }
            carregarPerfil();
            carregarPostesPerfil();
            carregarEventosPerfil();
            carregarFavoritosPerfil();
            atualizarContadores();
        });

        function carregarPerfil() {
            const usuario = window.auth?.getUsuarioAtual();
            if (!usuario) return;

            document.getElementById('perfil-nome').textContent = usuario.nome || 'Visitante Musical';
            document.getElementById('perfil-localizacao').textContent = `📍 ${usuario.pais || 'Angola'}, ${usuario.provincia || 'Luanda'}`;
            document.getElementById('perfil-lingua').textContent = `🌐 ${usuario.lingua || 'Português'}`;

            // Foto de perfil
            const fotoDisplay = document.getElementById('foto-perfil-display');
            if (usuario.fotoPerfil) {
                fotoDisplay.innerHTML = `<img src="${usuario.fotoPerfil}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">`;
            }

            // Redes sociais
            const redes = [];
            if (usuario.redesSociais?.youtube) redes.push({ nome: 'YouTube', link: usuario.redesSociais.youtube });
            if (usuario.redesSociais?.instagram) redes.push({ nome: 'Instagram', link: usuario.redesSociais.instagram });
            if (usuario.redesSociais?.tiktok) redes.push({ nome: 'TikTok', link: usuario.redesSociais.tiktok });
            document.getElementById('perfil-redes').innerHTML = redes.length > 0
                ? redes.map(r => `<a href="${r.link}" target="_blank" class="link-rede">🔗 ${r.nome}</a>`).join('')
                : '';

            // Contacto
            document.getElementById('perfil-contacto').textContent = usuario.contactoShow ? `📞 ${usuario.contactoShow}` : '';
        }

        function carregarPostesPerfil() {
            const usuario = window.auth?.getUsuarioAtual();
            const container = document.getElementById('lista-postes-perfil');
            
            // USAR A MESMA CHAVE do postagem.js
            const todosPostes = JSON.parse(localStorage.getItem('musica-alendaria-postes') || '[]');
            const meusPostes = todosPostes.filter(p => p.usuarioId === usuario?.id);

            if (meusPostes.length === 0) {
                container.innerHTML = `
                    <div class="estado-vazio">
                        <p class="vazio-descricao">Nenhum poste ainda</p>
                        <a href="postar.html" class="btn btn-primario btn-pequeno">+ Criar Poste</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = meusPostes.map(p => `
                <div class="card-musica-h" style="position: relative;">
                    <span style="font-size: 2rem;">🎬</span>
                    <div class="info-musica">
                        <div class="titulo-musica">${p.artista}</div>
                        <div class="artista-musica">${p.estilo || 'Diversa'} ${p.lingua ? '• ' + p.lingua : ''} ${p.ano ? '• ' + p.ano : ''}</div>
                        ${p.descricao ? `<p style="font-size: 0.75rem; color: var(--texto-terciario);">${p.descricao.substring(0, 80)}...</p>` : ''}
                        <span class="badge ${p.bloqueio === 'bloquear' ? 'badge-privado' : 'badge-publico'}" style="font-size: 0.7rem;">${p.bloqueio === 'bloquear' ? '🔒 Bloqueado' : '🔓 Livre'}</span>
                        <span class="badge badge-contorno" style="font-size: 0.7rem;">${p.visibilidade === 'publico' ? '🌍 Público' : '🔒 Privado'}</span>
                    </div>
                    <button class="btn-icone-pequeno" onclick="abrirEdicaoPoste('${p.id}')" title="Editar" style="position: absolute; top: 0.5rem; right: 0.5rem;">✏️</button>
                </div>
            `).join('');
        }

        function carregarEventosPerfil() {
            const usuario = window.auth?.getUsuarioAtual();
            const container = document.getElementById('lista-eventos-perfil');
            
            // USAR A MESMA CHAVE do eventos.html
            const todosEventos = JSON.parse(localStorage.getItem('eventos') || '[]');
            const meusEventos = todosEventos.filter(e => e.usuarioId === usuario?.id);
            meusEventos.sort((a, b) => new Date(b.dataCriacao) - new Date(a.dataCriacao));

            if (meusEventos.length === 0) {
                container.innerHTML = `
                    <div class="estado-vazio" style="grid-column: 1 / -1;">
                        <p class="vazio-descricao">Nenhum evento criado</p>
                        <a href="eventos.html" class="btn btn-primario btn-pequeno">+ Criar Evento</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = meusEventos.map(evt => {
                const dataInicio = evt.dataInicio ? new Date(evt.dataInicio + 'T00:00:00') : null;
                return `
                    <div class="card-evento">
                        <div class="data-evento">
                            <span class="dia-evento">${dataInicio ? dataInicio.getDate().toString().padStart(2, '0') : '??'}</span>
                            <span class="mes-evento">${dataInicio ? dataInicio.toLocaleString('pt', {month: 'short'}).toUpperCase() : '???'}</span>
                        </div>
                        <div class="info-evento">
                            <span class="tipo-evento">${evt.visibilidade === 'publico' ? '🌍 Público' : '🔒 Privado'}</span>
                            <h4 class="nome-evento">${evt.artista}</h4>
                            ${evt.descricao ? `<p style="font-size: 0.8rem; color: var(--texto-secundario);">${evt.descricao}</p>` : ''}
                            <p style="font-size: 0.75rem; color: var(--texto-terciario);">📆 ${evt.dataInicio || '?'} → ${evt.dataFim || '?'}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function carregarFavoritosPerfil() {
            const container = document.getElementById('lista-favoritos-perfil');
            const favoritos = window.favoritos?.getMusicas() || [];
            
            if (favoritos.length === 0) {
                container.innerHTML = '<div class="estado-vazio"><p class="vazio-descricao">Nenhuma música favorita</p></div>';
                return;
            }

            container.innerHTML = favoritos.map(m => `
                <div class="card-musica-h" style="margin-bottom: 0.5rem;">
                    <span style="font-size: 2rem;">🎵</span>
                    <div class="info-musica">
                        <div class="titulo-musica">${m.titulo}</div>
                        <div class="artista-musica">${m.genero} • ${m.ano}</div>
                    </div>
                    <button class="btn-icone-pequeno" onclick="window.favoritos?.remover('${m.id}'); carregarFavoritosPerfil(); atualizarContadores();">💔</button>
                </div>
            `).join('');
        }

        function alternarTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('ativo');
            document.querySelectorAll('.tab-conteudo').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
        }

        function atualizarContadores() {
            const usuario = window.auth?.getUsuarioAtual();
            const postes = JSON.parse(localStorage.getItem('musica-alendaria-postes') || '[]').filter(p => p.usuarioId === usuario?.id);
            const eventos = JSON.parse(localStorage.getItem('eventos') || '[]').filter(e => e.usuarioId === usuario?.id);
            
            document.getElementById('contador-favoritos').textContent = window.favoritos?.contar() || 0;
            document.getElementById('contador-postes').textContent = postes.length;
            document.getElementById('contador-eventos').textContent = eventos.length;
        }

        function atualizarFotoPerfil(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const usuario = window.auth?.getUsuarioAtual();
                if (usuario) {
                    usuario.fotoPerfil = e.target.result;
                    window.auth.atualizarPerfil({ fotoPerfil: e.target.result });
                    carregarPerfil();
                    mostrarToast('📷 Foto de perfil atualizada!', 'sucesso');
                }
            };
            reader.readAsDataURL(file);
        }

        // ====== EDIÇÃO DE POSTE ======
        function abrirEdicaoPoste(posteId) {
            const todosPostes = JSON.parse(localStorage.getItem('musica-alendaria-postes') || '[]');
            const poste = todosPostes.find(p => p.id === posteId);
            if (!poste) return;
            
            document.getElementById('editar-poste-id').value = posteId;
            document.getElementById('editar-poste-artista').value = poste.artista || '';
            document.getElementById('editar-poste-descricao').value = poste.descricao || '';
            document.getElementById('editar-poste-estilo').value = poste.estilo || '';
            document.getElementById('editar-poste-lingua').value = poste.lingua || '';
            document.getElementById('editar-poste-ano').value = poste.ano || '';
            document.getElementById('modal-editar-poste').classList.remove('hidden');
        }

        function fecharModalEdicao() {
            document.getElementById('modal-editar-poste').classList.add('hidden');
        }

        function salvarEdicaoPoste() {
            const id = document.getElementById('editar-poste-id').value;
            const todosPostes = JSON.parse(localStorage.getItem('musica-alendaria-postes') || '[]');
            const index = todosPostes.findIndex(p => p.id === id);
            if (index === -1) return;

            todosPostes[index].artista = document.getElementById('editar-poste-artista').value;
            todosPostes[index].descricao = document.getElementById('editar-poste-descricao').value;
            todosPostes[index].estilo = document.getElementById('editar-poste-estilo').value || 'Diversa';
            todosPostes[index].lingua = document.getElementById('editar-poste-lingua').value;
            todosPostes[index].ano = document.getElementById('editar-poste-ano').value;

            localStorage.setItem('musica-alendaria-postes', JSON.stringify(todosPostes));
            fecharModalEdicao();
            carregarPostesPerfil();
            mostrarToast('✅ Poste atualizado!', 'sucesso');
        }

        function mostrarToast(msg, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${tipo}`;
            toast.innerHTML = `<span class="toast-mensagem">${msg}</span>`;
            document.querySelector('.toast-container')?.appendChild(toast);
            setTimeout(() => { toast.classList.add('saindo'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // Fechar modal ao clicar fora
        document.getElementById('modal-editar-poste').addEventListener('click', function(e) {
            if (e.target === this) fecharModalEdicao();
        });
    </script>
</body>
</html>
