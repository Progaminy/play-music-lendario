<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artista - Musica Alendaria</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/lit.css">
    <link rel="stylesheet" href="css/dark.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/animacoes.css">
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/componentes.css">
    
    <link rel="icon" href="" type="image/png">
    <meta name="theme-color" content="#6c3ce0">
</head>
<body class="tema-lit">

    <div class="marca-dagua">Pensador Sem Fronteira</div>

    <!-- HEADER DESKTOP -->
    <header class="header header-desktop desktop-only">
        <div class="header-logo">
            <a href="index.html" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <img src="" alt="Logo" style="width: 36px; height: 36px; border-radius: 8px;">
                <span style="
    font-weight: 700; 
    font-size: 1.1rem; 
    background: var(--gradiente-primario); 
    background-clip: text; 
    -webkit-background-clip: text; 
    -webkit-text-fill-color: transparent;
">Musica Alendaria</span>
            </a>
        </div>
        <nav class="nav-desktop">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="artista.html" class="nav-link ativo">🎤 Artistas</a>
            <a href="eventos.html" class="nav-link">📅 Eventos</a>
            <a href="favoritos.html" class="nav-link">❤️ Favoritos</a>
            <a href="postar.html" class="nav-link">📤 Postar</a>
        </nav>
        <div class="header-acoes">
            <button class="btn-icone btn-alternar-tema" onclick="window.tema?.alternar()">🌓</button>
            <a href="perfil.html"><img src="assets/imagens/avatar-padrao.svg" alt="Perfil" class="avatar usuario-avatar" onerror="this.style.display='none'"></a>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="pagina-artista" style="padding-bottom: calc(var(--player-altura) + 80px);">
        
        <!-- CAPA DO ARTISTA -->
        <div class="capa-artista" id="capa-artista">
            <img src="" alt="Capa" id="artista-capa-img" onerror="this.style.background='var(--gradiente-dark)'">
            <div class="overlay-artista">
                <h1 id="artista-nome-capa" style="color: white; font-size: 1.8rem;">Carregando...</h1>
                <p id="artista-genero-capa" style="color: rgba(255,255,255,0.8);"></p>
            </div>
        </div>

        <!-- INFORMAÇÕES DO ARTISTA -->
        <div class="info-artista">
            <img src="" alt="Foto" class="foto-perfil-artista" id="artista-foto" onerror="this.style.display='none'">
            <div style="flex: 1;">
                <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem;">
                    <span id="artista-pais" style="font-size: 0.9rem; color: var(--texto-secundario);">📍 </span>
                    <span id="artista-seguidores" style="font-size: 0.9rem; color: var(--texto-secundario);">👥 </span>
                    <span id="artista-musicas-count" style="font-size: 0.9rem; color: var(--texto-secundario);">🎵 </span>
                </div>
                
                <!-- REDES SOCIAIS -->
                <div class="redes-artista" id="redes-artista" style="margin-bottom: 1rem;">
                    <!-- Preenchido pelo JS -->
                </div>

                <!-- BIOGRAFIA -->
                <div style="margin-top: 1rem;">
                    <h3 style="margin-bottom: 0.75rem;">📖 Biografia</h3>
                    <div id="artista-biografia" style="line-height: 1.8; color: var(--texto-secundario); font-size: 0.95rem; max-height: 300px; overflow-y: auto; padding-right: 0.5rem;">
                        Carregando biografia...
                    </div>
                    <button id="btn-ler-mais" class="btn-pequeno btn-secundario hidden" style="margin-top: 0.5rem;" onclick="toggleBiografia()">
                        Ler mais ↓
                    </button>
                </div>
            </div>
        </div>

        <!-- GALERIA DE FOTOS -->
        <div style="padding: 0 1rem; margin-bottom: 1.5rem;">
            <h3 style="margin-bottom: 0.75rem;">📷 Galeria</h3>
            <div id="galeria-artista" style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
                <!-- Preenchido pelo JS -->
            </div>
        </div>

        <!-- MÚSICAS DO ARTISTA -->
        <div style="padding: 0 1rem;">
            <h3 style="margin-bottom: 0.75rem;">🎵 Músicas</h3>
            
            <!-- FILTROS DENTRO DO ARTISTA -->
            <div class="barra-filtros" style="padding: 0; margin-bottom: 1rem;">
                <span class="filtro-item ativo" onclick="filtrarMusicasArtista('todos')">Todos</span>
            </div>

            <div class="lista-musicas" id="musicas-artista" style="padding: 0;">
                <!-- Preenchido pelo JS -->
            </div>
        </div>

        <!-- BLOG DO ARTISTA -->
        <div id="blog-artista-container" style="padding: 1rem; margin-top: 1.5rem;" class="hidden">
            <h3 style="margin-bottom: 0.75rem;">📝 Blog</h3>
            <a id="link-blog-artista" href="#" target="_blank" class="btn btn-secundario" style="display: inline-flex;">
                🌐 Visitar Blog do Artista →
            </a>
        </div>

    </main>

    <!-- NAVEGAÇÃO MOBILE -->
    <nav class="nav-mobile mobile-only">
        <button class="nav-item" data-nav="index"><span class="icon-nav">🏠</span><span>Home</span></button>
        <button class="nav-item" data-nav="favoritos"><span class="icon-nav">❤️</span><span>Favoritos</span></button>
        <button class="nav-item" data-nav="postar"><span class="icon-nav">➕</span><span>Postar</span></button>
        <button class="nav-item" data-nav="eventos"><span class="icon-nav">📅</span><span>Eventos</span></button>
        <button class="nav-item" data-nav="perfil"><span class="icon-nav">👤</span><span>Perfil</span></button>
    </nav>

    <!-- PLAYER FIXO -->
    <div class="player-fixo">
        <div class="player-progresso-container">
            <div class="player-progresso-preenchido" style="width: 0%;"></div>
        </div>
        <img src="" alt="Capa" class="player-capa">
        <div class="player-info">
            <div class="player-titulo">Nenhuma música</div>
            <div class="player-artista">Selecione uma música</div>
        </div>
        <div class="player-controles">
            <button class="btn-player btn-favorito">🤍</button>
        </div>
        <button class="btn-player btn-play">▶</button>
    </div>

    <div class="toast-container"></div>

    <!-- SCRIPTS -->
    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/player.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favoritos.js"></script>
    <script src="js/filtros.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/postagem.js"></script>
    <script src="js/offline.js"></script>
    <script src="js/suporte.js"></script>
    <script src="js/app.js"></script>

    <script>
        let artistaAtual = null;
        let biografiaExpandida = false;

        document.addEventListener('DOMContentLoaded', () => {
            if (!window.auth?.isAutenticado()) {
                window.location.href = 'login.html';
                return;
            }

            // Obter ID do artista da URL
            const params = new URLSearchParams(window.location.search);
            const artistaId = params.get('id') || DB.artistas[0]?.id;

            if (artistaId) {
                carregarArtista(artistaId);
            }
        });

        function carregarArtista(artistaId) {
            artistaAtual = buscarArtista(artistaId);
            if (!artistaAtual) {
                window.location.href = 'index.html';
                return;
            }

            document.title = `${artistaAtual.nome} - Musica Alendaria`;

            // Capa
            document.getElementById('artista-capa-img').src = artistaAtual.fotoCapa;
            document.getElementById('artista-nome-capa').textContent = artistaAtual.nome;
            document.getElementById('artista-genero-capa').textContent = artistaAtual.genero.join(' • ');

            // Foto perfil
            document.getElementById('artista-foto').src = artistaAtual.fotoPerfil;

            // Info
            document.getElementById('artista-pais').textContent = `📍 ${artistaAtual.pais}, ${artistaAtual.provincia}`;
            document.getElementById('artista-seguidores').textContent = `👥 ${formatarNumero(artistaAtual.totalSeguidores)} seguidores`;
            
            const musicas = buscarMusicasPorArtista(artistaId);
            document.getElementById('artista-musicas-count').textContent = `🎵 ${musicas.length} músicas`;

            // Biografia
            document.getElementById('artista-biografia').textContent = artistaAtual.biografia;
            const bioEl = document.getElementById('artista-biografia');
            if (bioEl.scrollHeight > 300) {
                document.getElementById('btn-ler-mais').classList.remove('hidden');
                bioEl.style.maxHeight = '200px';
                bioEl.style.overflow = 'hidden';
            }

            // Redes sociais
            const redesContainer = document.getElementById('redes-artista');
            redesContainer.innerHTML = Object.entries(artistaAtual.redesSociais).map(([rede, link]) => `
                <a href="${link}" target="_blank" class="link-rede" rel="noopener">
                    ${rede.charAt(0).toUpperCase() + rede.slice(1)}
                </a>
            `).join('');

            // Contacto para show
            if (artistaAtual.contactoShow || artistaAtual.emailContacto) {
                redesContainer.innerHTML += `
                    <span class="link-rede" style="cursor: default;">
                        📞 ${artistaAtual.contactoShow || artistaAtual.emailContacto}
                    </span>
                `;
            }

            // Galeria
            const galeriaContainer = document.getElementById('galeria-artista');
            if (artistaAtual.fotoGaleria && artistaAtual.fotoGaleria.length > 0) {
                galeriaContainer.innerHTML = artistaAtual.fotoGaleria.map(foto => `
                    <img src="${foto}" alt="Galeria" 
                         style="width: 150px; height: 150px; object-fit: cover; border-radius: 12px; flex-shrink: 0; cursor: pointer;"
                         onclick="window.modal?.imagem('${foto}', '${artistaAtual.nome}')"
                         onerror="this.style.display='none'">
                `).join('');
            } else {
                galeriaContainer.innerHTML = '<p style="color: var(--texto-terciario);">Nenhuma foto na galeria.</p>';
            }

            // Blog
            if (artistaAtual.blog) {
                document.getElementById('blog-artista-container').classList.remove('hidden');
                document.getElementById('link-blog-artista').href = artistaAtual.blog;
            }

            // Músicas
            renderizarMusicasArtista(musicas);
        }

        function renderizarMusicasArtista(musicas) {
            const container = document.getElementById('musicas-artista');
            if (!container) return;

            if (musicas.length === 0) {
                container.innerHTML = `
                    <div class="estado-vazio">
                        <p class="vazio-descricao">Nenhuma música disponível.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = musicas.map((m, i) => `
                <div class="card-musica-h stagger-item" data-musica-id="${m.id}" style="animation-delay: ${i * 0.05}s">
                    <img src="${m.capa}" alt="${m.titulo}" class="capa-musica" onerror="this.style.display='none'">
                    <div class="info-musica">
                        <div class="titulo-musica">${m.titulo}</div>
                        <div class="artista-musica">${m.ano} • ${m.duracao} • ${m.genero}</div>
                        <div style="display: flex; gap: 0.25rem; margin-top: 0.25rem;">
                            <span class="badge badge-primario">${m.genero}</span>
                            <span class="badge badge-contorno">${m.lingua}</span>
                        </div>
                    </div>
                    <div class="acoes-musica">
                        <button class="btn-icone-pequeno btn-favorito" data-musica-id="${m.id}" 
                                onclick="event.stopPropagation(); window.favoritos?.alternar('${m.id}')">
                            ${window.favoritos?.isFavorito(m.id) ? '❤️' : '🤍'}
                        </button>
                        <button class="btn-icone-pequeno" 
                                onclick="event.stopPropagation(); window.player?.tocar(buscarMusica('${m.id}'))">
                            ▶
                        </button>
                        <button class="btn-icone-pequeno" 
                                onclick="event.stopPropagation(); window.modal?.video(buscarMusica('${m.id}'))">
                            🎬
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleBiografia() {
            const bioEl = document.getElementById('artista-biografia');
            const btn = document.getElementById('btn-ler-mais');
            
            biografiaExpandida = !biografiaExpandida;
            
            if (biografiaExpandida) {
                bioEl.style.maxHeight = 'none';
                bioEl.style.overflow = 'visible';
                btn.textContent = 'Ler menos ↑';
            } else {
                bioEl.style.maxHeight = '200px';
                bioEl.style.overflow = 'hidden';
                btn.textContent = 'Ler mais ↓';
            }
        }

        function filtrarMusicasArtista(filtro) {
            const musicas = buscarMusicasPorArtista(artistaAtual?.id);
            let filtradas = musicas;

            if (filtro !== 'todos') {
                filtradas = musicas.filter(m => m.genero === filtro);
            }

            // Atualizar tags
            document.querySelectorAll('.barra-filtros .filtro-item').forEach(item => {
                item.classList.toggle('ativo', item.textContent.trim() === (filtro === 'todos' ? 'Todos' : filtro));
            });

            renderizarMusicasArtista(filtradas);
        }

        function formatarNumero(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
            return num.toString();
        }
    </script>

</body>
</html>
